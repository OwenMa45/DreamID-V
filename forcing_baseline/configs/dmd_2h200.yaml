# Stage-3 (2xH200): DMD distillation -> final few-step streaming face-swapper.
#   generator  = causal student (init from Stage-2 CD)
#   real_score = bidirectional DreamID-V-Faster teacher (frozen)
#   fake_score = bidirectional critic (trainable, init from teacher)
# CFG acts on img_ref (cond = real reference face / uncond = zeroed reference).
# Merged ON TOP of default_config.yaml.
trainer: distillation
distribution_loss: dmd

# --- run-machine absolute paths ---
t5_checkpoint: /inspire/hdd/global_user/liumingyu-253208120284/lzk/models/wan2.1-t2v-1.3b/models_t5_umt5-xxl-enc-bf16.pth
t5_tokenizer: /inspire/hdd/global_user/liumingyu-253208120284/lzk/models/wan2.1-t2v-1.3b/google/umt5-xxl
vae_checkpoint: /inspire/hdd/global_user/liumingyu-253208120284/lzk/models/wan2.1-t2v-1.3b/Wan2.1_VAE.pth
data_path: /inspire/hdd/global_user/liumingyu-253208120284/lzk/mrq/swapsf/pure_dreamidv/DreamID-V/forcing_baseline/dataset/swap_latents

# generator init = Stage-2 CD final ckpt (max_steps=5000 -> checkpoint_model_005000).
generator_ckpt: /inspire/hdd/global_user/liumingyu-253208120284/lzk/mrq/swapsf/pure_dreamidv/DreamID-V/forcing_baseline/checkpoints/chunkwise/stage2_cd_2h200/checkpoint_model_005000/model.pt
# real/fake score = bidirectional DreamID-V-Faster teacher weights
real_score_ckpt: /inspire/hdd/global_user/liumingyu-253208120284/lzk/models/DreamID-V/dreamidv_faster.pth
fake_score_ckpt: /inspire/hdd/global_user/liumingyu-253208120284/lzk/models/DreamID-V/dreamidv_faster.pth

sharding_strategy: full

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true

num_train_timestep: 1000
timestep_shift: 8.0
denoising_loss_type: flow
real_guidance_scale: 5.0
fake_guidance_scale: 0.0
ts_schedule: true
ts_schedule_max: false
min_score_timestep: 0
dfake_gen_update_ratio: 5

lr: 2.0e-06
lr_critic: 4.0e-07
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
batch_size: 1
ema_weight: 0.99
ema_start_step: 200
log_iters: 1000
gradient_checkpointing: true

# --- run control & wandb logging ---
# NOTE: max_steps counts TOTAL iterations (= critic updates). With
# dfake_gen_update_ratio=5 the GENERATOR is updated every 5th step, so
# max_steps=5000 -> only ~1000 generator updates. Raise to ~25000 if you want
# the generator to see ~5000 updates like Stage-1/2.
max_steps: 5000
disable_wandb: false
wandb_key: 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
wandb_entity: null
wandb_project: dreamidv_causal_forcing

# ID / ArcFace loss interface (disabled: DreamID-V ships no ArcFace head)
lambda_id: 0.0
